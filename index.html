<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
<title>ELO Caça Palavras</title>
<link rel="stylesheet" href="css/main.css" />
</head>
<body>
  <!-- HOME -->
  <section id="screenHome" class="screen active">
    <div class="home-header">
      <h1>ELO</h1>
      <div class="home-actions">
        <div class="coins">🪙 <span id="homeCoins">0</span></div>
        <button id="btnShop" class="btn-icon" aria-label="Loja">🛒</button>
      </div>
    </div>
    <div id="themeGrid" class="theme-grid"></div>
  </section>

  <!-- GAME -->
  <section id="screenGame" class="screen">
    <div class="game-header">
      <button id="btnPause" class="btn-icon">⏸</button>
      <div class="timer"><span id="timer">90</span>s</div>
      <div class="combo">×<span id="combo">1</span></div>
      <div class="coins">🪙 <span id="gameCoins">0</span></div>
    </div>
    <div id="wordChips" class="word-chips"></div>
    <div id="grid" class="grid"></div>
    <div id="toast" class="toast"></div>
  </section>

  <!-- PAUSE -->
  <section id="screenPause" class="screen modal">
    <div class="modal-card">
      <h2>Pausado</h2>
      <button id="btnResume" class="btn-primary">Continuar</button>
      <button id="btnQuit" class="btn-ghost">Sair</button>
    </div>
  </section>

  <!-- VICTORY -->
  <section id="screenVictory" class="screen modal">
    <div class="modal-card">
      <h2>Vitória!</h2>
      <p id="vStats"></p>
      <button id="btnNext" class="btn-primary">Próxima fase</button>
      <button id="btnVHome" class="btn-ghost">Home</button>
    </div>
  </section>

  <!-- DEFEAT -->
  <section id="screenDefeat" class="screen modal">
    <div class="modal-card">
      <h2>Fim de jogo</h2>
      <p id="dReason"></p>
      <button id="btnRetry" class="btn-primary">Tentar de novo</button>
      <button id="btnDHome" class="btn-ghost">Home</button>
    </div>
  </section>

  <!-- SHOP -->
  <section id="screenShop" class="screen">
    <div class="shop-header">
      <h2>Loja</h2>
      <div class="coins">🪙 <span id="shopCoins">0</span></div>
      <button id="btnShopClose" class="btn-icon">✕</button>
    </div>
    <div id="shopGrid" class="shop-grid"></div>
  </section>

  <!-- SCRIPTS -->
  <script src="js/data/words.js"></script>
  <script src="js/services/storage.js"></script>
  <script src="js/services/audio.js"></script>
  <script src="js/engine/grid.js"></script>
  <script src="js/engine/selection.js"></script>
  <script src="js/engine/game.js"></script>
  <script src="js/components/hud.js"></script>
  <script src="js/components/screens.js"></script>
  <script src="js/components/shop.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
