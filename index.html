<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ELO Caça Palavras Pro</title>
<style>
:root{--bg:#0f0f1a;--panel:#17172a;--panel-2:#1e1e35;--text:#e8e8f0;--muted:#9aa0b5;--cyan:#00e5ff;--yellow:#ffcc00;--green:#00e676;--skin-cell-bg:#17172a;--skin-cell-border:#2a2a40;--skin-accent:#00e5ff}
*{box-sizing:border-box}html,body{margin:0;height:100%;background:var(--bg);color:var(--text);font-family:system-ui,Arial,sans-serif}
.screen{display:none;min-height:100vh;padding:16px}.screen.active{display:block}
.btn-icon,.btn-primary,.btn-ghost{border:0;border-radius:12px;padding:10px 14px;font-weight:700;cursor:pointer}
.btn-icon{background:var(--panel-2);color:var(--text);font-size:18px;position:relative}
.badge{position:absolute;top:-6px;right:-6px;background:var(--yellow);color:#000;font-size:11px;padding:2px 6px;border-radius:999px;font-weight:800;min-width:18px;text-align:center}
.btn-primary{background:var(--cyan);color:#001}.btn-ghost{background:transparent;color:var(--muted);border:1px solid #333}
.home-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.home-actions{display:flex;gap:8px;align-items:center}
.coins{font-weight:700}
.theme-grid{display:grid;gap:12px;grid-template-columns:repeat(auto-fit,minmax(160px,1fr))}
.theme-card{background:linear-gradient(145deg,#17172a,#1e1e35);padding:18px;border-radius:16px;text-align:left;border:1px solid #2a2a40;cursor:pointer;transition:.2s}
.theme-card:hover{transform:translateY(-2px)}
.theme-card h3{margin:0 0 6px;color:#e8e8f0;font-size:18px;font-weight:800}
.theme-card p{margin:0;color:#9aa0b5;font-size:14px}
.daily-card{background:linear-gradient(145deg,#1a2a3a,#0f1f2f);border:1px solid var(--cyan);grid-column:1/-1}
.game-header{display:flex;flex-direction:column;gap:12px;margin-bottom:12px}
.hud-left{display:flex;gap:12px;align-items:center;justify-content:space-between;width:100%;flex-wrap:wrap}
.hud-right{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;width:100%}
.hud-right .btn-icon{padding:12px 6px;font-size:22px;display:flex;flex-direction:column;align-items:center}
.hud-right .badge{position:static;margin-top:4px}
.timer{font-size:22px;font-weight:800;color:var(--cyan)}
.combo{color:var(--yellow);font-weight:700}
.combo.hot{animation:comboPulse .6s ease infinite}
@keyframes comboPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
.word-chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.chip{background:var(--panel-2);padding:6px 12px;border-radius:999px;font-weight:700;font-size:14px}
.chip.found{opacity:.4;text-decoration:line-through}
.grid{display:grid;gap:8px;touch-action:none;user-select:none}
.grid.combo-hot{box-shadow:0 0 0 3px var(--yellow),0 0 30px rgba(255,204,0,.4);border-radius:16px;padding:4px}
.cell{background:var(--skin-cell-bg);border:2px solid var(--skin-cell-border);border-radius:12px;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:24px;transition:.2s;opacity:0;transform:scale(.8);animation:cellIn .3s ease forwards}
@keyframes cellIn{to{opacity:1;transform:scale(1)}}
.cell.is-selecting{background:#0b3b4a;border-color:var(--cyan);box-shadow:0 0 12px rgba(0,229,255,.4)}
.cell.is-selecting-start{outline:3px solid var(--cyan)}
.cell.found-0{background:#0a3d2e;border-color:var(--green)}
.cell.found-1{background:#3a2a06;border-color:var(--yellow)}
.cell.found-2{background:#2a1a4a;border-color:#b388ff}
.cell.hint{animation:hint 1s ease 3}
@keyframes hint{0%,100%{transform:scale(1)}50%{transform:scale(1.1);box-shadow:0 0 20px rgba(255,204,0,.8)}}
.toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%);background:#000c;padding:10px 16px;border-radius:12px;opacity:0;transition:.2s;z-index:100}
.toast.show{opacity:1}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:50}
.modal.active{display:flex}
.modal-card{background:var(--panel);padding:24px;border-radius:20px;min-width:280px;max-width:360px;text-align:center;display:flex;flex-direction:column;gap:12px}
.shop-header{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #2a2a40;margin-bottom:12px}
.shop-grid{display:grid;gap:12px;grid-template-columns:repeat(auto-fit,minmax(160px,1fr))}
.shop-item{background:var(--panel-2);border:1px solid #2a2a40;border-radius:14px;padding:16px;text-align:center;display:flex;flex-direction:column;gap:8px}
.shop-item h3{margin:0;color:var(--text)}
.shop-item p{margin:0;color:var(--muted);font-size:13px;min-height:32px}
.shop-item.owned{opacity:.6}
.do-pop{animation:pop .25s ease}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
.freeze{animation:freeze 10s linear}
@keyframes freeze{0%{box-shadow:0 0 0 rgba(0,229,255,0)}10%{box-shadow:0 0 20px rgba(0,229,255,.6)}90%{box-shadow:0 0 20px rgba(0,229,255,.6)}100%{box-shadow:0 0 0 rgba(0,229,255,0)}}
.tutorial-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.tutorial-overlay.active{display:flex}
.tutorial-card{background:var(--panel);border:2px solid var(--cyan);border-radius:20px;padding:24px;max-width:320px;text-align:center;display:flex;flex-direction:column;gap:16px;box-shadow:0 0 30px rgba(0,229,255,.3)}
.tutorial-card h3{margin:0;color:var(--cyan);font-size:20px}
.tutorial-card p{margin:0;color:var(--text);line-height:1.5}
.tutorial-progress{color:var(--muted);font-size:13px}
.tutorial-actions{display:flex;gap:10px}
.tutorial-actions button{flex:1}
.achv-list{display:flex;flex-direction:column;gap:8px;text-align:left}
.achv-item{background:var(--panel-2);padding:10px;border-radius:10px;display:flex;justify-content:space-between;align-items:center}
.achv-item.done{opacity:.7}
.achv-item .icon{font-size:20px}
</style>
</head>
<body>
<section id="screenHome" class="screen active">
  <div class="home-header">
    <h1>ELO</h1>
    <div class="home-actions">
      <div class="coins">🪙 <span id="homeCoins">0</span></div>
      <button id="btnAchievements" class="btn-icon" title="Conquistas">🏆</button>
      <button id="btnTutorial" class="btn-icon" title="Como jogar">❓</button>
      <button id="btnShop" class="btn-icon">🛒</button>
      <button id="btnMute" class="btn-icon" title="Som">🔊</button>
    </div>
  </div>
  <div id="themeGrid" class="theme-grid"></div>
</section>

<section id="screenGame" class="screen">
  <div class="game-header">
    <div class="hud-left">
      <button id="btnPause" class="btn-icon">⏸</button>
      <div class="timer"><span id="timer">180</span>s</div>
      <div class="combo">×<span id="combo">1</span></div>
      <div class="coins">🪙 <span id="gameCoins">0</span></div>
      <button id="btnMuteGame" class="btn-icon" title="Som">🔊</button>
    </div>
    <div class="hud-right">
      <button id="btnHint" class="btn-icon">💡<span class="badge" id="badgeHint">0</span></button>
      <button id="btnReveal" class="btn-icon">👁️<span class="badge" id="badgeReveal">0</span></button>
      <button id="btnTime" class="btn-icon">⏱️<span class="badge" id="badgeTime">0</span></button>
      <button id="btnFreeze" class="btn-icon">❄️<span class="badge" id="badgeFreeze">0</span></button>
    </div>
  </div>
  <div id="wordChips" class="word-chips"></div>
  <div id="grid" class="grid"></div>
  <div id="toast" class="toast"></div>
</section>

<section id="screenShop" class="screen">
  <div class="shop-header">
    <h2>Loja</h2>
    <div class="coins">🪙 <span id="shopCoins">0</span></div>
    <button id="btnShopClose" class="btn-icon">✕</button>
  </div>
  <div id="shopTabs" style="display:flex;gap:8px;margin-bottom:12px">
    <button id="tabPower" class="btn-primary">Power-ups</button>
    <button id="tabSkins" class="btn-ghost">Skins</button>
  </div>
  <div id="shopGrid" class="shop-grid"></div>
</section>

<section id="screenPause" class="screen modal">
  <div class="modal-card">
    <h2>Pausado</h2>
    <button id="btnResume" class="btn-primary">Continuar</button>
    <button id="btnQuit" class="btn-ghost">Sair</button>
  </div>
</section>

<section id="screenVictory" class="screen modal">
  <div class="modal-card">
    <h2>Vitória!</h2>
    <p id="vStats"></p>
    <button id="btnNext" class="btn-primary">Próxima fase</button>
    <button id="btnVHome" class="btn-ghost">Home</button>
  </div>
</section>

<section id="screenDefeat" class="screen modal">
  <div class="modal-card">
    <h2>Fim de jogo</h2>
    <p id="dReason"></p>
    <button id="btnRetry" class="btn-primary">Tentar de novo</button>
    <button id="btnDHome" class="btn-ghost">Home</button>
  </div>
</section>

<section id="screenAchievements" class="screen modal">
  <div class="modal-card">
    <h2>Conquistas</h2>
    <div id="achvList" class="achv-list"></div>
    <button id="btnAchvClose" class="btn-primary">Fechar</button>
  </div>
</section>

<div id="tutorialOverlay" class="tutorial-overlay">
  <div class="tutorial-card">
    <h3 id="tutTitle">Bem-vindo!</h3>
    <p id="tutText">Vamos aprender a jogar em 4 passos rápidos.</p>
    <div class="tutorial-progress" id="tutProgress">1 / 4</div>
    <div class="tutorial-actions">
      <button id="tutSkip" class="btn-ghost">Pular</button>
      <button id="tutNext" class="btn-primary">Próximo</button>
    </div>
  </div>
</div>
<script>
const AudioEngine=(()=>{let ctx=null;let muted=localStorage.getItem('elo_muted')==='1';const ensure=()=>{if(!ctx)ctx=new (window.AudioContext||window.webkitAudioContext)()};function beep(f,d,t='sine',v=0.2){if(muted)return;ensure();const o=ctx.createOscillator();const g=ctx.createGain();o.type=t;o.frequency.value=f;g.gain.value=v;o.connect(g);g.connect(ctx.destination);o.start();o.stop(ctx.currentTime+d)}return{isMuted:()=>muted,toggle(){muted=!muted;localStorage.setItem('elo_muted',muted?'1':'0');return muted},found(){beep(880,0.12);setTimeout(()=>beep(1320,0.12),120)},error(){beep(200,0.15,'square',0.15)},click(){beep(600,0.07)},coin(){beep(1200,0.1);setTimeout(()=>beep(1600,0.1),100)},victory(){[523,659,783,1046].forEach((f,i)=>setTimeout(()=>beep(f,0.15),i*150))}}})();

const Store={kCoins:'elo_coins',kInv:'elo_inv',kTut:'elo_tutorial_seen',kSkin:'elo_skin',kAchv:'elo_achv',kDaily:'elo_daily_',getCoins(){return+localStorage.getItem(this.kCoins)||0},addCoins(n){const v=this.getCoins()+n;localStorage.setItem(this.kCoins,v);return v},spendCoins(n){const c=this.getCoins();if(c<n)return false;localStorage.setItem(this.kCoins,c-n);return true},getInv(){try{return JSON.parse(localStorage.getItem(this.kInv)||'{"hint":0,"reveal":0,"time":0,"freeze":0}')}catch{return{hint:0,reveal:0,time:0,freeze:0}}},setInv(o){localStorage.setItem(this.kInv,JSON.stringify(o))},addItem(id,q=1){const inv=this.getInv();inv[id]=(inv[id]||0)+q;this.setInv(inv)},useItem(id){const inv=this.getInv();if(!inv[id])return false;inv[id]--;this.setInv(inv);return true},hasSeenTut(){return localStorage.getItem(this.kTut)==='1'},setTutSeen(){localStorage.setItem(this.kTut,'1')},getSkin(){return localStorage.getItem(this.kSkin)||'default'},setSkin(id){localStorage.setItem(this.kSkin,id)},getAchv(){try{return JSON.parse(localStorage.getItem(this.kAchv)||'{}')}catch{return{}}},setAchv(o){localStorage.setItem(this.kAchv,JSON.stringify(o))},getDaily(key){return localStorage.getItem(this.kDaily+key)},setDaily(key,val){localStorage.setItem(this.kDaily+key,val)}};

const Skins=[
{id:'default',name:'Padrão',price:0,colors:{cell:'#17172a',border:'#2a2a40',accent:'#00e5ff'}},
{id:'neon',name:'Neon',price:500,colors:{cell:'#0a0a1a',border:'#ff00ff',accent:'#ff00ff'}},
{id:'forest',name:'Floresta',price:400,colors:{cell:'#0f1a0f',border:'#2a4a2a',accent:'#39f587'}},
{id:'sunset',name:'Pôr do Sol',price:450,colors:{cell:'#1a0f0f',border:'#4a2a2a',accent:'#ff9f1c'}}
];

const Achievements={firstWin:{name:'Primeira Vitória',icon:'🎉',desc:'Vença sua primeira fase'},combo5:{name:'Combo Master',icon:'🔥',desc:'Alcance combo x5'},noError:{name:'Perfeccionista',icon:'💎',desc:'Vença sem errar'},powerUser:{name:'Estrategista',icon:'🧠',desc:'Use todos os 4 power-ups'},daily3:{name:'Dedicado',icon:'📅',desc:'Jogue 3 dias seguidos'}};

const WordData={themes:[
{id:'animais',name:'Animais',icon:'🐾',levels:[{size:8,words:['GATO','LEAO','URSO','LOBO','PATO']},{size:9,words:['COBRA','TIGRE','GIRAFA','MACACO','ONCA']},{size:10,words:['CACHORRO','ELEFANTE','PAPAGAIO','JACARE','TARTARUGA']}]},
{id:'frutas',name:'Frutas',icon:'🍎',levels:[{size:8,words:['MACA','PERA','UVA','KIWI','FIGO']},{size:9,words:['BANANA','MANGA','MELAO','MORANGO','LIMAO']},{size:10,words:['ABACAXI','MARACUJA','FRAMBOESA','GOIABA','LARANJA']}]},
{id:'esportes',name:'Esportes',icon:'⚽',levels:[{size:8,words:['SURF','BOXE','POLO','GOLF','LUTA']},{size:9,words:['TENIS','VOLEI','FUTEBOL','NATACAO','CICLISMO']}]},
{id:'paises',name:'Países',icon:'🌍',levels:[{size:8,words:['CHILE','CHINA','CUBA','PERU','IRAQ']},{size:9,words:['BRASIL','JAPAO','ITALIA','RUSSIA','CANADA']}]},
{id:'cores',name:'Cores',icon:'🎨',levels:[{size:8,words:['AZUL','ROSA','ROXO','PRETO','VERDE']},{size:9,words:['LARANJA','AMARELO','VERMELHO','BRANCO','CINZA']}]},
{id:'profissoes',name:'Profissões',icon:'💼',levels:[{size:9,words:['MEDICO','ADVOGADO','PROFESSOR','ENGENHEIRO','CHEF']},{size:10,words:['BOMBEIRO','POLICIAL','DENTISTA','ARQUITETO','PILOTO']}]}
]};

const GridEngine=(()=>{const A='ABCDEFGHIJKLMNOPQRSTUVWXYZ';const R=m=>Math.floor(Math.random()*m);const E=s=>Array.from({length:s},()=>Array(s).fill(''));function gen(t,l){const{size,words}=t.levels[l];return place(size,words)}function place(s,ws){const g=E(s),p=[];ws.forEach(w=>{for(let a=0;a<200;a++){const d=[[0,1],[1,0]][R(2)],r0=R(s),c0=R(s),er=r0+d[0]*(w.length-1),ec=c0+d[1]*(w.length-1);if(er<0||er>=s||ec<0||ec>=s)continue;let ok=true,cells=[];for(let i=0;i<w.length;i++){const r=r0+d[0]*i,c=c0+d[1]*i,ch=g[r][c];if(ch&&ch!==w[i]){ok=false;break}cells.push({r,c})}if(!ok)continue;cells.forEach((c,i)=>g[c.r][c.c]=w[i]);p.push({word:w,cells});break}});for(let r=0;r<s;r++)for(let c=0;c<s;c++)if(!g[r][c])g[r][c]=A[R(26)];return{grid:g,placed:p}}return{gen}})();

const SelectionEngine=(()=>{let G,S,onSel,act=false,st=null,cells=[];const cellAt=(x,y)=>{const e=document.elementFromPoint(x,y)?.closest('.cell');return e&&G.contains(e)?{r:+e.dataset.r,c:+e.dataset.c}:null};const line=(a,b)=>{const dr=Math.sign(b.r-a.r),dc=Math.sign(b.c-a.c);const n=Math.max(Math.abs(b.r-a.r),Math.abs(b.c-a.c));const o=[];for(let i=0;i<=n;i++)o.push({r:a.r+dr*i,c:a.c+dc*i});return o};const paint=()=>{G.querySelectorAll('.is-selecting,.is-selecting-start').forEach(e=>e.classList.remove('is-selecting','is-selecting-start'));cells.forEach(({r,c},i)=>{const e=G.querySelector(`[data-r="${r}"][data-c="${c}"]`);if(e){e.classList.add('is-selecting');if(!i)e.classList.add('is-selecting-start')}})};const finish=()=>{if(cells.length)onSel?.(cells);cells=[];paint();act=false;st=null};return{init(g,sz,fn){G=g;S=sz;onSel=fn;G.style.touchAction='none';const down=e=>{const c=cellAt(e.clientX,e.clientY);if(!c)return;act=true;st=c;cells=[c];paint()};const move=e=>{if(!act)return;const c=cellAt(e.clientX,e.clientY);if(!c)return;cells=line(st,c);paint()};G.addEventListener('pointerdown',down);window.addEventListener('pointermove',move);window.addEventListener('pointerup',()=>act&&finish());G.addEventListener('touchstart',e=>{const t=e.touches[0];down({clientX:t.clientX,clientY:t.clientY})},{passive:true});window.addEventListener('touchmove',e=>{if(!act)return;const t=e.touches[0];move({clientX:t.clientX,clientY:t.clientY})},{passive:true});window.addEventListener('touchend',()=>act&&finish())},markFound(cs,ci){cs.forEach(({r,c})=>document.querySelector(`[data-r="${r}"][data-c="${c}"]`)?.classList.add(`found-${ci}`,'do-pop'))},hintCell(r,c){const e=document.querySelector(`[data-r="${r}"][data-c="${c}"]`);if(e){e.classList.add('hint');setTimeout(()=>e.classList.remove('hint'),3000)}}}})();

const GameEngine=(()=>{let st={},tm=null,frozen=false,ev={},errors=0,usedPower=new Set();const emit=(e,...a)=>(ev[e]||[]).forEach(f=>f(...a));const on=(e,f)=>(ev[e]=ev[e]||[]).push(f);function start(tid,li,isDaily=false){const th=WordData.themes.find(t=>t.id===tid);const{grid,placed}=GridEngine.gen(th,li);st={theme:tid,level:li,size:th.levels[li].size,words:th.levels[li].words.map((w,i)=>({word:w,found:false,color:i%3})),placed,found:new Set(),timer:180,combo:1,running:true,isDaily};errors=0;usedPower.clear();render(grid);SelectionEngine.init(document.getElementById('grid'),st.size,onSelect);tick();return{words:st.words}}function render(g){const el=document.getElementById('grid');el.innerHTML='';el.style.gridTemplateColumns=`repeat(${st.size},1fr)`;el.classList.remove('combo-hot');let idx=0;g.forEach((row,r)=>row.forEach((ch,c)=>{const d=document.createElement('div');d.className='cell';d.dataset.r=r;d.dataset.c=c;d.textContent=ch;d.style.animationDelay=`${idx*20}ms`;el.appendChild(d);idx++}))}function onSelect(cells){const key=cells.map(c=>`${c.r},${c.c}`).join('|');const hit=st.placed.find(p=>{const f=p.cells.map(c=>`${c.r},${c.c}`).join('|');const r=[...p.cells].reverse().map(c=>`${c.r},${c.c}`).join('|');return key===f||key===r});if(hit&&!st.found.has(hit.word)){foundWord(hit)}else{errors++;emit('error')}}function foundWord(hit){st.found.add(hit.word);const wd=st.words.find(x=>x.word===hit.word);wd.found=true;const earn=10*wd.word.length*st.combo;Store.addCoins(earn);SelectionEngine.markFound(hit.cells,wd.color);emit('found',wd,earn);if(navigator.vibrate)navigator.vibrate(20);st.combo++;emit('combo',st.combo);if(st.combo>=3){document.getElementById('grid').classList.add('combo-hot');document.getElementById('combo').parentElement.classList.add('hot')}if(st.found.size===st.words.length){stop();emit('victory',{errors,usedPower:[...usedPower],isDaily:st.isDaily,time:180-st.timer})}}function tick(){clearInterval(tm);tm=setInterval(()=>{if(!st.running||frozen)return;st.timer--;emit('tick',st.timer);if(st.timer<=0){stop();emit('defeat')}},1000)}function stop(){clearInterval(tm);st.running=false}function hint(){usedPower.add('hint');const t=st.words.find(w=>!w.found);if(!t)return false;const p=st.placed.find(x=>x.word===t.word);if(!p)return false;SelectionEngine.hintCell(p.cells[0].r,p.cells[0].c);return true}function reveal(){usedPower.add('reveal');const t=st.words.find(w=>!w.found);if(!t)return false;const p=st.placed.find(x=>x.word===t.word);if(!p)return false;foundWord(p);return true}function addTime(s){usedPower.add('time');st.timer+=s;emit('tick',st.timer)}function freeze(){usedPower.add('freeze');if(frozen)return;frozen=true;document.getElementById('grid').classList.add('freeze');emit('freezeStart');setTimeout(()=>{frozen=false;document.getElementById('grid').classList.remove('freeze');emit('freezeEnd')},10000)}return{start,on,get:()=>st,pause(){st.running=false},resume(){st.running=true},hint,reveal,addTime,freeze}})();

const HUD={updCoins(){const c=Store.getCoins();document.getElementById('homeCoins').textContent=c;document.getElementById('gameCoins').textContent=c;document.getElementById('shopCoins').textContent=c},updInv(){const inv=Store.getInv();document.getElementById('badgeHint').textContent=inv.hint;document.getElementById('badgeReveal').textContent=inv.reveal;document.getElementById('badgeTime').textContent=inv.time;document.getElementById('badgeFreeze').textContent=inv.freeze},setTimer(t){document.getElementById('timer').textContent=t},setCombo(c){document.getElementById('combo').textContent=c},renderWords(ws){const el=document.getElementById('wordChips');el.innerHTML='';ws.forEach(w=>{const s=document.createElement('span');s.className='chip';s.dataset.word=w.word;s.textContent=w.word;el.appendChild(s)})},markFound(w){document.querySelector(`.chip[data-word="${w}"]`)?.classList.add('found')},toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1500)}};
const Shop={mode:'power',itemsPower:[{id:'hint',name:'Dica',desc:'Revela 1 letra',price:50,icon:'💡'},{id:'reveal',name:'Revelar Palavra',desc:'Encontra uma palavra inteira',price:150,icon:'👁️'},{id:'time',name:'+15s',desc:'Adiciona 15 segundos',price:80,icon:'⏱️'},{id:'freeze',name:'Congelar',desc:'Pausa o tempo por 10s',price:120,icon:'❄️'}],open(){HUD.updCoins();this.mode='power';render();Screens.show('screenShop')},buyPower(it){if(!Store.spendCoins(it.price)){HUD.toast('Moedas insuficientes');return}Store.addItem(it.id,1);HUD.updCoins();HUD.updInv();HUD.toast(`${it.name} comprado!`);render()},buySkin(skin){const owned=JSON.parse(localStorage.getItem('elo_skins')||'["default"]');if(owned.includes(skin.id)){Store.setSkin(skin.id);applySkin();HUD.toast('Skin aplicada!');render();return}if(!Store.spendCoins(skin.price)){HUD.toast('Moedas insuficientes');return}owned.push(skin.id);localStorage.setItem('elo_skins',JSON.stringify(owned));Store.setSkin(skin.id);applySkin();HUD.updCoins();HUD.toast('Skin desbloqueada!');render()}};function render(){const g=document.getElementById('shopGrid');g.innerHTML='';if(Shop.mode==='power'){Shop.itemsPower.forEach(it=>{const d=document.createElement('div');d.className='shop-item';d.innerHTML=`<h3>${it.icon} ${it.name}</h3><p>${it.desc}</p><div class="price">🪙 ${it.price}</div><button class="btn-primary">Comprar</button>`;d.querySelector('button').onclick=()=>{AudioEngine.click();Shop.buyPower(it)};g.appendChild(d)})}else{const owned=JSON.parse(localStorage.getItem('elo_skins')||'["default"]');const current=Store.getSkin();Skins.forEach(s=>{const isOwned=owned.includes(s.id);const d=document.createElement('div');d.className='shop-item'+(isOwned?' owned':'');d.innerHTML=`<h3>${s.name}</h3><p style="color:${s.colors.accent}">Accent</p><div class="price">${isOwned?(current===s.id?'✅ Ativa':'🪙 0'):`🪙 ${s.price}`}</div><button class="btn-primary">${isOwned?(current===s.id?'Ativa':'Aplicar'):'Comprar'}</button>`;d.querySelector('button').onclick=()=>{AudioEngine.click();Shop.buySkin(s)};g.appendChild(d)})}}

function applySkin(){const skin=Skins.find(s=>s.id===Store.getSkin())||Skins[0];document.documentElement.style.setProperty('--skin-cell-bg',skin.colors.cell);document.documentElement.style.setProperty('--skin-cell-border',skin.colors.border);document.documentElement.style.setProperty('--skin-accent',skin.colors.accent)}

const Screens={show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')},home(){document.querySelectorAll('.modal').forEach(m=>m.classList.remove('active'));this.show('screenHome')}};

const Tutorial={steps:[{title:'1. Arraste para selecionar',text:'Toque na primeira letra e arraste até a última.'},{title:'2. Encontre as palavras',text:'As palavras aparecem em chips acima do tabuleiro.'},{title:'3. Use os power-ups',text:'Compre itens na Loja e use 💡👁️⏱️❄️'},{title:'4. Corra contra o tempo',text:'Faça combos para ganhar mais moedas!'}],idx:0,show(force=false){if(!force&&Store.hasSeenTut())return;document.getElementById('tutorialOverlay').classList.add('active');this.idx=0;this.render()},render(){const s=this.steps[this.idx];document.getElementById('tutTitle').textContent=s.title;document.getElementById('tutText').textContent=s.text;document.getElementById('tutProgress').textContent=`${this.idx+1} / ${this.steps.length}`;document.getElementById('tutNext').textContent=this.idx===this.steps.length-1?'Começar':'Próximo'},next(){if(this.idx<this.steps.length-1){this.idx++;this.render()}else{this.close()}},close(){document.getElementById('tutorialOverlay').classList.remove('active');Store.setTutSeen()}};

function updateMuteUI(){const muted=AudioEngine.isMuted();const icon=muted?'🔇':'🔊';document.getElementById('btnMute').textContent=icon;document.getElementById('btnMuteGame').textContent=icon}

function checkAchievements(data){const achv=Store.getAchv();let changed=false;if(!achv.firstWin){achv.firstWin=true;changed=true;HUD.toast('🏆 Primeira Vitória!')}if(data.combo>=5 && !achv.combo5){achv.combo5=true;changed=true;HUD.toast('🏆 Combo Master!')}if(data.errors===0 && !achv.noError){achv.noError=true;changed=true;HUD.toast('🏆 Perfeccionista!')}if(data.usedPower.length>=4 && !achv.powerUser){achv.powerUser=true;changed=true;HUD.toast('🏆 Estrategista!')}if(changed)Store.setAchv(achv)}

function renderAchievements(){const achv=Store.getAchv();const list=document.getElementById('achvList');list.innerHTML='';Object.entries(Achievements).forEach(([k,v])=>{const done=!!achv[k];const d=document.createElement('div');d.className='achv-item'+(done?' done':'');d.innerHTML=`<div><div class="icon">${v.icon}</div><div><strong>${v.name}</strong><br><small>${v.desc}</small></div></div><div>${done?'✅':'🔒'}</div>`;list.appendChild(d)})}

function getDailySeed(){const d=new Date();return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`}function startDaily(){const seed=getDailySeed();const themes=WordData.themes;const idx=seed.split('-').reduce((a,b)=>a+ +b,0)%themes.length;const th=themes[idx];const lvl=0;const r=GameEngine.start(th.id,lvl,true);HUD.renderWords(r.words);HUD.setTimer(180);HUD.setCombo(1);HUD.updCoins();HUD.updInv();Screens.show('screenGame')}
document.addEventListener('DOMContentLoaded',()=>{
applySkin();HUD.updCoins();HUD.updInv();updateMuteUI();
const grid=document.getElementById('themeGrid');
// Daily card
const dailyBtn=document.createElement('button');dailyBtn.className='theme-card daily-card';const today=getDailySeed();const best=Store.getDaily(today);dailyBtn.innerHTML=`<h3>📅 Desafio Diário</h3><p>${best?`Melhor: ${best}s`:'Jogue hoje!'}</p>`;dailyBtn.onclick=()=>{AudioEngine.click();startDaily()};grid.appendChild(dailyBtn);
WordData.themes.forEach(t=>{const b=document.createElement('button');b.className='theme-card';b.innerHTML=`<h3>${t.icon||''} ${t.name}</h3><p>${t.levels.length} fases</p>`;b.onclick=()=>{AudioEngine.click();const r=GameEngine.start(t.id,0);HUD.renderWords(r.words);HUD.setTimer(180);HUD.setCombo(1);HUD.updCoins();HUD.updInv();Screens.show('screenGame')};grid.appendChild(b)});
GameEngine.on('tick',t=>HUD.setTimer(t));
GameEngine.on('combo',c=>HUD.setCombo(c));
GameEngine.on('found',(w,e)=>{HUD.markFound(w.word);HUD.toast(`+${e} 🪙`);HUD.updCoins();AudioEngine.found();AudioEngine.coin()});
GameEngine.on('error',()=>{HUD.toast('Tente outra vez');AudioEngine.error()});
GameEngine.on('victory',(data)=>{document.getElementById('vStats').textContent=`Moedas: ${Store.getCoins()}`;document.getElementById('screenVictory').classList.add('active');AudioEngine.victory();checkAchievements({combo:GameEngine.get().combo,errors:data.errors,usedPower:data.usedPower});if(data.isDaily){const key=getDailySeed();const prev=Store.getDaily(key);if(!prev||data.time<+prev)Store.setDaily(key,data.time)}});
GameEngine.on('defeat',()=>{document.getElementById('dReason').textContent='Acabou o tempo';document.getElementById('screenDefeat').classList.add('active')});
GameEngine.on('freezeStart',()=>HUD.toast('Tempo congelado 10s'));
GameEngine.on('freezeEnd',()=>HUD.toast('Tempo voltou'));
document.getElementById('btnShop').onclick=()=>{AudioEngine.click();Shop.open()};
document.getElementById('btnTutorial').onclick=()=>{AudioEngine.click();Tutorial.show(true)};
document.getElementById('btnAchievements').onclick=()=>{AudioEngine.click();renderAchievements();document.getElementById('screenAchievements').classList.add('active')};
document.getElementById('btnAchvClose').onclick=()=>{AudioEngine.click();document.getElementById('screenAchievements').classList.remove('active')};
document.getElementById('btnShopClose').onclick=()=>{AudioEngine.click();Screens.home()};
document.getElementById('btnPause').onclick=()=>{AudioEngine.click();GameEngine.pause();document.getElementById('screenPause').classList.add('active')};
document.getElementById('btnResume').onclick=()=>{AudioEngine.click();document.getElementById('screenPause').classList.remove('active');GameEngine.resume()};
document.getElementById('btnQuit').onclick=()=>{AudioEngine.click();document.getElementById('screenPause').classList.remove('active');Screens.home()};
document.getElementById('btnVHome').onclick=()=>{AudioEngine.click();document.getElementById('screenVictory').classList.remove('active');Screens.home()};
document.getElementById('btnNext').onclick=()=>{AudioEngine.click();const s=GameEngine.get();const th=WordData.themes.find(t=>t.id===s.theme);const nl=(s.level+1)%th.levels.length;const r=GameEngine.start(s.theme,nl);HUD.renderWords(r.words);document.getElementById('screenVictory').classList.remove('active');Screens.show('screenGame')};
document.getElementById('btnDHome').onclick=()=>{AudioEngine.click();document.getElementById('screenDefeat').classList.remove('active');Screens.home()};
document.getElementById('btnRetry').onclick=()=>{AudioEngine.click();const s=GameEngine.get();const r=GameEngine.start(s.theme,s.level,s.isDaily);HUD.renderWords(r.words);document.getElementById('screenDefeat').classList.remove('active');Screens.show('screenGame')};
document.getElementById('btnHint').onclick=()=>{if(!Store.useItem('hint')){HUD.toast('Compre dicas na loja');return}if(GameEngine.hint()){HUD.updInv();HUD.toast('Dica usada');AudioEngine.click()}};
document.getElementById('btnReveal').onclick=()=>{if(!Store.useItem('reveal')){HUD.toast('Compre na loja');return}if(GameEngine.reveal()){HUD.updInv();HUD.toast('Palavra revelada!');AudioEngine.click()}};
document.getElementById('btnTime').onclick=()=>{if(!Store.useItem('time')){HUD.toast('Compre tempo na loja');return}GameEngine.addTime(15);HUD.updInv();HUD.toast('+15s');AudioEngine.click()};
document.getElementById('btnFreeze').onclick=()=>{if(!Store.useItem('freeze')){HUD.toast('Compre na loja');return}GameEngine.freeze();HUD.updInv();AudioEngine.click()};
document.getElementById('tutNext').onclick=()=>{AudioEngine.click();Tutorial.next()};
document.getElementById('tutSkip').onclick=()=>{AudioEngine.click();Tutorial.close()};
const toggleMute=()=>{AudioEngine.toggle();updateMuteUI();AudioEngine.click()};
document.getElementById('btnMute').onclick=toggleMute;
document.getElementById('btnMuteGame').onclick=toggleMute;
document.getElementById('tabPower').onclick=()=>{Shop.mode='power';document.getElementById('tabPower').className='btn-primary';document.getElementById('tabSkins').className='btn-ghost';render()};
document.getElementById('tabSkins').onclick=()=>{Shop.mode='skins';document.getElementById('tabSkins').className='btn-primary';document.getElementById('tabPower').className='btn-ghost';render()};
setTimeout(()=>Tutorial.show(),800);
});
</script>
</body>
</html>
