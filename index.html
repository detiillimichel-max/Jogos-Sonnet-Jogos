<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#060514" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Elo Palavras</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,400;0,700;0,900;1,900&family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/ui.css" />
  <link rel="stylesheet" href="css/game.css" />
</head>
<body>

  <!-- ══════════════════════════════════
       HOME
  ══════════════════════════════════ -->
  <div class="screen screen-home is-active" id="screenHome">
    <div class="home-glow home-glow--1"></div>
    <div class="home-glow home-glow--2"></div>

    <header class="home-header">
      <div class="logo">
        <span class="logo-elo">ELO</span><span class="logo-palavras">PALAVRAS</span>
      </div>
      <p class="home-tagline">Encontre · Conecte · Vença</p>
    </header>

    <div class="theme-grid" id="themeGrid">
      <!-- Temas injetados pelo screens.js -->
    </div>

    <footer class="home-footer">
      <div class="coins-pill">
        <span class="coins-pill__icon">🪙</span>
        <span class="coins-pill__value" id="homeCoins">0</span>
      </div>
    </footer>
  </div>

  <!-- ══════════════════════════════════
       JOGO
  ══════════════════════════════════ -->
  <div class="screen screen-game" id="screenGame">

    <div class="hud">
      <button class="hud-icon-btn" id="btnPause" aria-label="Pausar">⏸</button>

      <div class="hud-center">
        <div class="hud-timer" id="hudTimer">
          <span class="timer-val" id="timerVal">90</span>
          <span class="timer-label">seg</span>
        </div>
        <div class="hud-combo" id="hudCombo">
          <span class="combo-val" id="comboVal">×1</span>
          <span class="combo-label">combo</span>
        </div>
      </div>

      <div class="hud-coins">
        <span>🪙</span>
        <span id="gameCoins">0</span>
      </div>
    </div>

    <div class="words-bar" id="wordsBar">
      <!-- Chips de palavras injetados pelo hud.js -->
    </div>

    <div class="grid-wrap">
      <div class="grid" id="grid" style="--gs:10">
        <!-- Células injetadas pelo game.js -->
      </div>
    </div>

    <div class="feedback-toast" id="feedbackToast"></div>

  </div>

  <!-- ══════════════════════════════════
       VITÓRIA
  ══════════════════════════════════ -->
  <div class="screen screen-result screen-victory" id="screenVictory">
    <div class="result-card">
      <div class="result-emoji" id="victoryEmoji">🎉</div>
      <h2 class="result-title">Você Venceu!</h2>
      <div class="stars-row" id="starsRow">
        <span class="star" id="s1">☆</span>
        <span class="star" id="s2">☆</span>
        <span class="star" id="s3">☆</span>
      </div>
      <div class="result-stats" id="resultStats"></div>
      <div class="result-actions">
        <button class="btn btn--ghost" id="btnVHome">🏠 Início</button>
        <button class="btn btn--primary" id="btnNext">Próxima ▶</button>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════
       DERROTA
  ══════════════════════════════════ -->
  <div class="screen screen-result screen-defeat" id="screenDefeat">
    <div class="result-card">
      <div class="result-emoji">💀</div>
      <h2 class="result-title">Fim de Jogo</h2>
      <p class="result-msg" id="defeatMsg">O tempo acabou!</p>
      <div class="result-actions">
        <button class="btn btn--ghost" id="btnDHome">🏠 Início</button>
        <button class="btn btn--primary" id="btnRetry">🔁 Tentar de Novo</button>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════
       PAUSA (overlay)
  ══════════════════════════════════ -->
  <div class="overlay-pause" id="overlayPause" aria-hidden="true">
    <div class="pause-card">
      <h2 class="pause-title">⏸ Pausado</h2>
      <button class="btn btn--primary" id="btnResume">▶ Continuar</button>
      <button class="btn btn--ghost"   id="btnQuit">🏠 Sair</button>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/data/words.js"></script>
  <script src="js/services/storage.js"></script>
  <script src="js/engine/grid.js"></script>
  <script src="js/engine/selection.js"></script>
  <script src="js/engine/game.js"></script>
  <script src="js/components/hud.js"></script>
  <script src="js/components/screens.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
